# LP Cidadania — HTTPS ativo (após init-ssl.sh). Redirect 80->443 e www->apex.

server {
    listen 80;
    listen [::]:80;
    server_name drgustavoribeiro.com.br www.drgustavoribeiro.com.br _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://drgustavoribeiro.com.br$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.drgustavoribeiro.com.br;

    ssl_certificate /etc/letsencrypt/live/drgustavoribeiro.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drgustavoribeiro.com.br/privkey.pem;

    return 301 https://drgustavoribeiro.com.br$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name drgustavoribeiro.com.br;

    ssl_certificate /etc/letsencrypt/live/drgustavoribeiro.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drgustavoribeiro.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /usr/share/nginx/html;
    index index.html;

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    error_page 404 /404.html;
}
