# LP Cidadania — HTTP. Serve o export estático e o desafio ACME.
# Após o DNS de drgustavoribeiro.com.br apontar pro servidor, rode
# deploy/init-ssl.sh: emite o cert e troca esta conf pela nginx-ssl.conf.

server {
    listen 80;
    listen [::]:80;
    server_name drgustavoribeiro.com.br www.drgustavoribeiro.com.br _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /usr/share/nginx/html;
    index index.html;

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # export estático: /cidadania-lituana -> /cidadania-lituana.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    error_page 404 /404.html;
}
